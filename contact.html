<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #000, #333);
      color: rgb(255, 255, 255);
      overflow: hidden;
    }

    .head1 {
      width: 100%;
      height: 100vh;
      background: linear-gradient(to right, #000, #333);
      overflow: hidden;
      position: relative;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .head11 {
      width: 100%;
      height: 100%;
      background: url('/img/4BMW.jpg') no-repeat center center/cover;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      opacity: 0.3;
      animation: slide 10s infinite alternate;
    }

    .head12 {
      width: 100%;
      height: 100%;
      background: url('/img/rdmod2.png') no-repeat center center/contain;
      position: absolute;
      top: 0;
      left: 0;
      animation: slideReverse 10s infinite alternate;
    }

    @keyframes slide {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-20px);
      }
    }

    @keyframes slideReverse {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(20px);
      }
    }

    .back {
      /* position: absolute; */
      /* top: 200px;
      left: 0; */
      width: 600px;
      height: 800px;
      background: rgba(0, 0, 0, .9);
      z-index: 1;
      display: inline-block;
      padding-left: 40px;
      padding-top: 40px;
      border-radius: 100px 0px;
      /* justify-content: center; */
    }


    label {
      display: block;
      margin: 20px 0 10px;
      font-size: 24px;
      font-weight: 600;
    }

    input,
    textarea {
      width: 86%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 18px;
      background: linear-gradient(to right, cyan, rgb(10, 73, 73));
    }

    textarea {
      height: 120px;
      resize: none;
    }

    .left-box {
      padding: 80px 6px;
      box-sizing: border-box;
    }

    .title {
      font-size: 55px;
      font-weight: 700;
      background: linear-gradient(to right, #0047ff, #00eaff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      font-size: 28px;
      margin-top: -10px;
      color: #00d5ff;
    }

    .underline {
      width: 190px;
      height: 4px;
      background: #abff9f;
      margin: 5px 0 40px;
    }
  </style>
</head>

<body>
  <div class="head1">
    <div class="head11" style="background: url('img/4BMW.jpg') no-repeat center center/cover;"></div>
    <div class="head12" style="background: url('img/rdmod2.png') no-repeat center center/contain;"></div>
    <div class="back">
      <div class="left-box">
        <div class="title">Contact Me</div>
        <div class="subtitle">by Mr Nobody</div>
        <div class="underline"></div>

        <label>Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Mail id</label>
        <input type="text" placeholder="Enter your mail id">

        <label>What in your mind</label>
        <textarea placeholder="What you're trying to say"></textarea>
        <br><br>
        Its Just a demo page for contact form
      </div>
    </div>
  </div>
</body>

</html>
